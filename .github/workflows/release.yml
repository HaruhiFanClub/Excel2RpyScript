# 发版流水线：push tag / 手动 dispatch -> macOS arm64 + Windows x64 并行构建
# -> GitHub Release -> 可选 R2 镜像 -> 可选 Cloudflare purge。
#
# 本地触发方式：
#   1. 在 notes/CHANGELOG-next.md 写更新日志
#   2. pnpm release 0.1.1
#
# GitHub 手动触发：
#   Actions -> Release -> Run workflow，输入已存在的 tag（如 v0.1.1）。
#
# release environment 可选 secrets：
#   APPLE_CERTIFICATE / APPLE_CERTIFICATE_PASSWORD  macOS Developer ID .p12 base64 与密码
#   APPLE_SIGNING_IDENTITY                          可选，Developer ID Application identity 名称
#   APPLE_API_KEY / APPLE_API_KEY_ID / APPLE_API_ISSUER
#                                                    推荐的 App Store Connect API key 公证凭据
#   APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID
#                                                    备选 Apple ID 公证凭据
#   R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY / R2_BUCKET / R2_PUBLIC_BASE
#   CLOUDFLARE_ZONE_ID / CLOUDFLARE_API_TOKEN
#
# 说明：CI 默认打不内置 TTS 核心的包。远端 TTS 与其它功能不受影响；
# 全离线 TTS 包仍可在目标系统本地设置 E2R_TTS_CORE 后用 dist:* 构建。

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (例如 v0.1.1，必须已经存在)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "10.11.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm -r test

      - name: Typecheck
        run: pnpm -r typecheck

  build-macos-arm64:
    name: Build · macOS arm64
    needs: verify
    runs-on: macos-latest
    environment: release
    timeout-minutes: 60
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Import Apple signing certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE_PASSWORD:-}" ]; then
            echo "APPLE_CERTIFICATE_PASSWORD is required when APPLE_CERTIFICATE is configured." >&2
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/build-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITIES="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH")"
          printf '%s\n' "$IDENTITIES"
          if ! printf '%s\n' "$IDENTITIES" | grep -q "Developer ID Application:"; then
            echo "The imported certificate does not contain a valid Developer ID Application identity." >&2
            exit 1
          fi

          IDENTITY_LINE=""
          if [ -n "${APPLE_SIGNING_IDENTITY:-}" ]; then
            IDENTITY="$APPLE_SIGNING_IDENTITY"
            if [ "${IDENTITY#*\"}" != "$IDENTITY" ]; then
              IDENTITY="${IDENTITY#*\"}"
              IDENTITY="${IDENTITY%%\"*}"
            fi
            IDENTITY="${IDENTITY%\"}"
            IDENTITY="${IDENTITY#\"}"
            IDENTITY="${IDENTITY#Developer ID Application: }"
            IDENTITY="${IDENTITY#Developer ID Installer: }"
            IDENTITY="${IDENTITY#3rd Party Mac Developer Application: }"
            IDENTITY="${IDENTITY#3rd Party Mac Developer Installer: }"
            IDENTITY_LINE="$(printf '%s\n' "$IDENTITIES" | grep "Developer ID Application:" | grep -F "$IDENTITY" | head -n 1 || true)"
            if [ -z "$IDENTITY_LINE" ]; then
              echo "APPLE_SIGNING_IDENTITY was not found in the imported certificate." >&2
              exit 1
            fi
            echo "CSC_NAME=$IDENTITY" >> "$GITHUB_ENV"
          else
            IDENTITY_LINE="$(printf '%s\n' "$IDENTITIES" | grep "Developer ID Application:" | head -n 1 || true)"
          fi

          CODESIGN_IDENTITY="$(printf '%s\n' "$IDENTITY_LINE" | awk '{print $2}')"
          if [ -z "$CODESIGN_IDENTITY" ]; then
            echo "Unable to resolve Developer ID Application identity hash." >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$CODESIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "CSC_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Validate Apple notarization inputs
        if: env.APPLE_CERTIFICATE != ''
        run: |
          set -euo pipefail
          HAS_API_KEY=false
          HAS_APPLE_ID=false

          if [ -n "${APPLE_API_KEY:-}" ] || [ -n "${APPLE_API_KEY_ID:-}" ] || [ -n "${APPLE_API_ISSUER:-}" ]; then
            if [ -z "${APPLE_API_KEY:-}" ] || [ -z "${APPLE_API_KEY_ID:-}" ] || [ -z "${APPLE_API_ISSUER:-}" ]; then
              echo "APPLE_API_KEY, APPLE_API_KEY_ID and APPLE_API_ISSUER must be configured together." >&2
              exit 1
            fi
            HAS_API_KEY=true
          fi

          if [ -n "${APPLE_ID:-}" ] || [ -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -n "${APPLE_TEAM_ID:-}" ]; then
            if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_APP_SPECIFIC_PASSWORD:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ]; then
              echo "APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD and APPLE_TEAM_ID must be configured together." >&2
              exit 1
            fi
            HAS_APPLE_ID=true
          fi

          if [ "$HAS_API_KEY" = "true" ] && [ "$HAS_APPLE_ID" = "true" ]; then
            echo "Configure either App Store Connect API key notarization or Apple ID notarization, not both." >&2
            exit 1
          fi
          if [ "$HAS_API_KEY" != "true" ] && [ "$HAS_APPLE_ID" != "true" ]; then
            echo "Notarization credentials are required for signed macOS releases." >&2
            exit 1
          fi

      - name: Materialize Apple notarization API key
        if: env.APPLE_API_KEY != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER != ''
        run: |
          set -euo pipefail
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          if printf '%s' "$APPLE_API_KEY" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s\n' "$APPLE_API_KEY" > "$API_KEY_PATH"
          else
            printf '%s' "$APPLE_API_KEY" | base64 --decode -o "$API_KEY_PATH"
          fi
          chmod 600 "$API_KEY_PATH"
          echo "APPLE_API_KEY=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Disable signing when no certificate is configured
        if: env.APPLE_CERTIFICATE == ''
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build DMG
        run: |
          set -euo pipefail
          pnpm --filter @e2r/app build
          if [ -n "${APPLE_CERTIFICATE:-}" ]; then
            pnpm --filter @e2r/app exec electron-builder --mac --arm64 --publish never --config.forceCodeSigning=true
          else
            pnpm --filter @e2r/app exec electron-builder --mac --arm64 --publish never
          fi

      - name: Notarize macOS DMG
        if: env.APPLE_CERTIFICATE != ''
        run: |
          set -euo pipefail
          DMG_PATH="$(find packages/app/release -name "*.dmg" -type f -print -quit)"
          if [ -z "$DMG_PATH" ]; then
            echo "Expected DMG was not produced." >&2
            exit 1
          fi
          if [ -z "${CODESIGN_IDENTITY:-}" ]; then
            echo "CODESIGN_IDENTITY is required to sign the DMG." >&2
            exit 1
          fi

          codesign --force --sign "$CODESIGN_IDENTITY" \
            --keychain "$CSC_KEYCHAIN" \
            --timestamp \
            "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

          if [ -n "${APPLE_API_KEY:-}" ] && [ -n "${APPLE_API_KEY_ID:-}" ] && [ -n "${APPLE_API_ISSUER:-}" ]; then
            xcrun notarytool submit "$DMG_PATH" \
              --key "$APPLE_API_KEY" \
              --key-id "$APPLE_API_KEY_ID" \
              --issuer "$APPLE_API_ISSUER" \
              --wait
          else
            xcrun notarytool submit "$DMG_PATH" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
          fi
          xcrun stapler staple "$DMG_PATH"

      - name: Verify macOS signature and notarization
        if: env.APPLE_CERTIFICATE != ''
        run: |
          set -euo pipefail
          APP_PATH="$(find packages/app/release -name "Excel2Rpy.app" -type d -print -quit)"
          DMG_PATH="$(find packages/app/release -name "*.dmg" -type f -print -quit)"
          if [ -z "$APP_PATH" ] || [ -z "$DMG_PATH" ]; then
            echo "Expected signed app and DMG were not produced." >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            packages/app/release/*.dmg
          if-no-files-found: error
          retention-days: 7

  build-windows-x64:
    name: Build · Windows x64
    needs: verify
    runs-on: windows-latest
    environment: release
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installer and portable zip
        run: |
          pnpm --filter @e2r/app build
          pnpm --filter @e2r/app exec electron-builder --win --x64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            packages/app/release/*.exe
            packages/app/release/*.zip
            packages/app/release/*.blockmap
            packages/app/release/latest*.yml
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish
    needs: [build-macos-arm64, build-windows-x64]
    runs-on: ubuntu-latest
    environment: release
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      R2_PUBLIC_BASE: ${{ secrets.R2_PUBLIC_BASE }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve tag and release notes
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          NOTES_FILE="release-notes.md"
          if [ -f "notes/$TAG.md" ]; then
            cp "notes/$TAG.md" "$NOTES_FILE"
          elif git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            git tag -l --format='%(contents)' "$TAG" > "$NOTES_FILE"
          fi
          if [ -s "$NOTES_FILE" ]; then
            CLEAN_NOTES="$(mktemp)"
            grep -v -F '<!-- 在这里写下一个版本的更新日志，中文自由发挥 -->' "$NOTES_FILE" \
              | grep -v -F '<!-- 发版时会自动归档到 notes/v<version>.md，并作为 GitHub Release Notes 与 latest.json 的 notes 字段 -->' \
              > "$CLEAN_NOTES" || true
            mv "$CLEAN_NOTES" "$NOTES_FILE"
          fi
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Excel2Rpy $TAG" > "$NOTES_FILE"
          fi
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Compose latest.json
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ci-compose-latest-json.mjs

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.exe" -o \
            -name "*.zip" -o \
            -name "*.blockmap" -o \
            -name "*.yml" \
          \) -exec cp {} release-assets/ \;
          if [ -d "assets/release-attachments" ]; then
            find assets/release-attachments -maxdepth 1 -type f -exec cp {} release-assets/ \;
          fi
          cp dist-release/latest.github.json release-assets/latest.json
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Excel2Rpy ${{ steps.meta.outputs.tag }}
          body_path: ${{ steps.meta.outputs.notes_file }}
          draft: false
          prerelease: false
          files: release-assets/*
          fail_on_unmatched_files: true

      - name: Upload mirror to R2
        if: env.R2_ACCOUNT_ID != '' && env.R2_ACCESS_KEY_ID != '' && env.R2_SECRET_ACCESS_KEY != '' && env.R2_BUCKET != '' && env.R2_PUBLIC_BASE != ''
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: node scripts/ci-upload-r2.mjs

      - name: Prune old versions on R2
        if: env.R2_ACCOUNT_ID != '' && env.R2_ACCESS_KEY_ID != '' && env.R2_SECRET_ACCESS_KEY != '' && env.R2_BUCKET != ''
        env:
          CURRENT_VERSION: ${{ steps.meta.outputs.version }}
          RETAIN_VERSIONS: ${{ vars.R2_RETAIN_VERSIONS || '2' }}
        run: node scripts/ci-prune-r2.mjs

      - name: Purge Cloudflare cache for latest.json
        if: env.CLOUDFLARE_ZONE_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && env.R2_PUBLIC_BASE != ''
        run: node scripts/ci-purge-cf.mjs

      - name: Summary
        run: |
          echo "### Release ${{ steps.meta.outputs.tag }} published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitHub: https://github.com/${{ github.repository }}/releases/tag/${{ steps.meta.outputs.tag }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${R2_PUBLIC_BASE}" ]; then
            echo "- R2: ${R2_PUBLIC_BASE}/latest.json" >> "$GITHUB_STEP_SUMMARY"
          fi
